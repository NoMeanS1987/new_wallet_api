services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: wallet_user
      POSTGRES_PASSWORD: wallet_pass
      POSTGRES_DB: wallet_db
    ports:
      - "5433:5432"
  
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
       DATABASE_URL: postgresql+psycopg2://wallet_user:wallet_pass@db:5432/wallet_db
    depends_on:
      - db
    restart: on-failure